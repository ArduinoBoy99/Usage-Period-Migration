version: 2.1

jobs:
  build-and-test-service:
    parameters:
      service_name:
        type: string
        description: "Name of the service directory"
    docker:
      - image: cimg/go:1.26.1
    resource_class: large
    working_directory: ~/project
    steps:
      - checkout

      - restore_cache:
          keys:
            - go-mod-v1-{{ checksum "go.sum" }}
            - go-mod-v1-

      - run:
          name: Download Go modules
          command: go mod download

      - save_cache:
          key: go-mod-v1-{{ checksum "go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod

      - run:
          name: Build << parameters.service_name >>
          command: |
            cd << parameters.service_name >>
            go build -v -o /tmp/<< parameters.service_name >> ./cmd

      - run:
          name: Test << parameters.service_name >>
          command: |
            cd << parameters.service_name >>
            go test ./... -v -race -coverprofile=coverage.out

      - store_test_results:
          path: << parameters.service_name >>/coverage.out

workflows:
  version: 2
  build_and_test_all_services:
    jobs:
      - build-and-test-service:
          name: build-and-test-analytics-exporter
          service_name: analytics-exporter
      - build-and-test-service:
          name: build-and-test-billing-processor
          service_name: billing-processor
      - build-and-test-service:
          name: build-and-test-outbox-publisher
          service_name: outbox-publisher
      - build-and-test-service:
          name: build-and-test-usage-service
          service_name: usage-service