version: '3.8'

services:
  postgres:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usage_db
    ports:
      - "5433:5432" # Use 5433 instead of 5432 to keep locally running DB intact
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic usage-billing-chunks \
        --partitions 48 \
        --replication-factor 1
  
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic billing-processed \
        --partitions 48 \
        --replication-factor 1
  
      kafka-topics --bootstrap-server kafka:9092 --list
      "

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration-service:
    build:
      context: .
      dockerfile: migration-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: usage_db
      DB_SSL_MODE: disable

  usage-service:
    build:
      context: .
      dockerfile: usage-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: usage_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_CONSUMER_GROUP: usage-services
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8001:8000"

  billing-processor:
    build:
      context: .
      dockerfile: billing-processor/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: usage_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_CONSUMER_GROUP: billing-processors
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8002:8000"

  outbox-publisher:
    build:
      context: .
      dockerfile: outbox-publisher/Dockerfile
    environment:
      REPLAY_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: usage_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8003:8000"

  analytics-exporter:
    build:
      context: .
      dockerfile: analytics-exporter/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: billing-processed
      KAFKA_CONSUMER_GROUP: analytics-exporters
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8004:8000"

volumes:
  postgres_data: